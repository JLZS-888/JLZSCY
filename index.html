<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>计量证书查询</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: SimSun, 宋体, serif !important; background: #fff; min-height: 100vh; padding: 16px; }
        body * { font-family: SimSun, 宋体, serif !important; }
        .max-w-lg { max-width: 32rem; margin: 0 auto; }
        .rounded-t-3xl { border-radius: 1.5rem 1.5rem 0 0; }
        .rounded-b-3xl { border-radius: 0 0 1.5rem 1.5rem; }
        .shadow-xl { box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1); }
        .text-center { text-align: center; }
        .overflow-hidden { overflow: hidden; }
        .hidden { display: none !important; }
        .flex { display: flex; }
        .bg-blue-50 { background: #eff6ff; }
        .bg-white { background: #fff; }
        .bg-blue-600 { background: #2563eb; }
        .bg-emerald-600 { background: #059669; }
        .bg-amber-600 { background: #d97706; }
        .bg-red-500 { background: #ef4444; }
        .bg-red-600 { background: #dc2626; }
        .bg-blue-100 { background: #dbeafe; }
        .text-white { color: #fff; }
        .text-slate-400 { color: #94a3b8; }
        .text-slate-500 { color: #64748b; }
        .text-slate-800 { color: #1e293b; }
        .text-blue-600 { color: #2563eb; }
        .text-emerald-600 { color: #059669; }
        .text-red-500 { color: #ef4444; }
        .text-2xl { font-size: 1.5rem; line-height: 2rem; }
        .text-4xl { font-size: 2.25rem; line-height: 2.5rem; }
        .text-xs { font-size: 0.75rem; line-height: 1rem; }
        .text-sm { font-size: 0.875rem; line-height: 1.25rem; }
        .text-base { font-size: 1rem; line-height: 1.5rem; }
        .font-black { font-weight: 900; }
        .font-bold { font-weight: 700; }
        .font-normal { font-weight: 400; }
        .tracking-widest { letter-spacing: 0.1em; }
        .tracking-wider { letter-spacing: 0.05em; }
        .p-2 { padding: 0.5rem; }
        .p-4 { padding: 1rem; }
        .p-6 { padding: 1.5rem; }
        .py-12 { padding-top: 3rem; padding-bottom: 3rem; }
        .pb-4 { padding-bottom: 1rem; }
        .mb-4 { margin-bottom: 1rem; }
        .mt-2 { margin-top: 0.5rem; }
        .mt-4 { margin-top: 1rem; }
        .pt-2 { padding-top: 0.5rem; }
        .pb-2 { padding-bottom: 0.5rem; }
        .space-y-2 > * + * { margin-top: 0.5rem; }
        .space-y-4 > * + * { margin-top: 1rem; }
        .border-b { border-bottom: 1px solid #e2e8f0; }
        .border-t { border-top: 1px solid #e2e8f0; }
        .border-slate-100 { border-color: #f1f5f9; }
        .border-slate-200 { border-color: #e2e8f0; }
        .rounded-xl { border-radius: 0.75rem; }
        .rounded-2xl { border-radius: 1rem; }
        .rounded-full { border-radius: 9999px; }
        .block { display: block; }
        .w-full { width: 100%; }
        .bg-\[\#1e88e5\] { background: #1e88e5; }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
        }
    </style>
</head>
<body class="bg-white min-h-screen p-4">
    <div class="max-w-lg mx-auto">
        <!-- 头部 -->
        <div id="headerArea" class="rounded-t-3xl shadow-xl text-center overflow-hidden bg-white">
            <!-- 默认蓝色标题 -->
            <div id="defaultHeader" class="bg-[#1e88e5] text-white p-6">
                <h1 class="text-2xl font-black tracking-widest">计量证书查询</h1>
            </div>
            <!-- 深圳计量院图片标题 -->
            <div id="szjlyHeader" class="hidden">
                <img src="images/sz-jly-title.png" alt="深圳计量院" class="w-full">
            </div>
        </div>
        
        <!-- 主内容 -->
        <div class="bg-blue-50 p-6 rounded-b-3xl shadow-xl" id="contentArea">
            <!-- 加载中 -->
            <div id="loading" class="text-center py-12">
                <div style="display:inline-block;width:32px;height:32px;border:3px solid #dbeafe;border-top-color:#2563eb;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px;"></div>
                <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
                <p class="text-slate-400">加载中...</p>
            </div>
            
            <!-- 错误提示 -->
            <div id="error" class="hidden text-center py-12">
                <div class="text-4xl mb-4">❌</div>
                <p class="text-red-500 font-bold">未找到证书信息</p>
                <p class="text-slate-400 text-sm mt-2" id="errorMsg">请检查二维码是否正确</p>
                <button onclick="location.reload()" class="mt-4 bg-blue-600 text-white px-6 py-2 rounded-full font-bold text-sm">🔄 重新加载</button>
            </div>
            
            <!-- 证书内容 -->
            <div id="certInfo" class="hidden space-y-4">
                <!-- 证书编号 -->
                <div class="text-center pb-4 border-b border-slate-100">
                    <div class="text-xs text-slate-400">证书编号</div>
                    <div id="certId" class="text-2xl font-black text-blue-600 tracking-wider"></div>
                </div>
                
                <!-- 信息卡片（单列大字） -->
                <div id="infoCards" class="space-y-2 text-base">
                    <!-- 由 JS 动态渲染 -->
                </div>
            </div>
        </div>
        
        <!-- 底部图片（仅深圳计量院显示） -->
        <div id="szjlyBottomImg" class="hidden mt-4">
            <img src="images/qr-bottom.jpg" alt="" class="w-full block">
        </div>
    </div>

    <script>
        // 解析 unit 参数，切换标题
        function initHeader() {
            const params = new URLSearchParams(window.location.search);
            const unit = params.get('u');
            if (unit === 'S') {
                document.getElementById('defaultHeader').classList.add('hidden');
                document.getElementById('szjlyHeader').classList.remove('hidden');
                document.getElementById('szjlyBottomImg').classList.remove('hidden');
            }
        }
        initHeader();
        
        // 字段配置（可由URL参数控制）
        let fieldConfig = {
            certId: true, reportType: true, result: true,
            orderNumber: true, client: true, instrumentName: true,
            manufacturer: true, calibrationDate: true, expiryDate: true,
            factoryNumber: true, model: true
        };
        
        // 字段顺序（与 cfgMask 对应）
        const FIELD_ORDER = ['certId', 'reportType', 'result', 'orderNumber', 'client', 'instrumentName', 'manufacturer', 'calibrationDate', 'expiryDate', 'factoryNumber', 'model'];

        // ===== 调试日志 =====
        const _dbg = [];
        function dbg(msg) { console.log('[CYXT]', msg); _dbg.push(msg); }
        
        // 解析URL参数
        function parseUrlParams() {
            const params = new URLSearchParams(window.location.search);
            const d = params.get('d');
            const cfg = params.get('cfg');
            if (!d) return null;
            
            // 解析字段配置掩码（11位：certId, reportType, result, orderNumber, client, instrumentName, manufacturer, calibrationDate, expiryDate, factoryNumber, model）
            if (cfg && cfg.length === 11) {
                FIELD_ORDER.forEach((f, i) => {
                    fieldConfig[f] = cfg[i] === '1';
                });
            } else if (cfg && cfg.length === 10) {
                // 兼容旧格式（10位，不含 certId）
                fieldConfig.certId = true;
                fieldConfig.reportType = cfg[0] === '1';
                fieldConfig.result = cfg[1] === '1';
                fieldConfig.orderNumber = cfg[2] === '1';
                fieldConfig.client = cfg[3] === '1';
                fieldConfig.instrumentName = cfg[4] === '1';
                fieldConfig.manufacturer = cfg[5] === '1';
                fieldConfig.calibrationDate = cfg[6] === '1';
                fieldConfig.expiryDate = cfg[7] === '1';
                fieldConfig.factoryNumber = cfg[8] === '1';
                fieldConfig.model = cfg[9] === '1';
            }
            
            try {
                const decoded = decodeURIComponent(d);
                
                // 尝试新格式：Base64 编码的 JSON
                if (decoded.startsWith('ey') || decoded.match(/^[A-Za-z0-9+/=]+$/)) {
                    try {
                        const jsonStr = decodeURIComponent(escape(atob(decoded)));
                        const data = JSON.parse(jsonStr);
                        
                        // 新格式：a=委托单位(第一), b=证书编号, c=报告类型, d=委托单号, e=仪器名称, f=制造厂, g=校准日期, h=有效期, i=出厂编号, j=规格型号, z=结果(最后)
                        const cert = {
                            client: data.a || '',
                            id: data.b || '',
                            reportType: data.c === 'J' ? '检定' : data.c === 'X' ? '校准' : '',
                            orderNumber: data.d || '',
                            instrumentName: data.e || '',
                            manufacturer: data.f || '',
                            calibrationDate: data.g || '',
                            expiryDate: data.h || '',
                            factoryNumber: data.i || '',
                            model: data.j || '',
                            result: data.z === 'H' ? '合格' : data.z === 'B' ? '符合要求' : ''
                        };
                        
                        // 兼容旧格式
                        if (!cert.client && data.cl) cert.client = data.cl;
                        if (!cert.id && data.id) cert.id = data.id;
                        if (!cert.reportType && data.rt) cert.reportType = data.rt === 'J' ? '检定' : data.rt === 'X' ? '校准' : '';
                        if (!cert.orderNumber && data.on) cert.orderNumber = data.on;
                        if (!cert.instrumentName && data.in) cert.instrumentName = data.in;
                        if (!cert.manufacturer && data.mf) cert.manufacturer = data.mf;
                        if (!cert.calibrationDate && data.cd) cert.calibrationDate = data.cd;
                        if (!cert.expiryDate && data.ed) cert.expiryDate = data.ed;
                        if (!cert.factoryNumber && data.fn) cert.factoryNumber = data.fn;
                        if (!cert.model && data.md) cert.model = data.md;
                        if (!cert.result && data.rs) cert.result = data.rs === 'H' ? '合格' : data.rs === 'B' ? '符合要求' : '';
                        
                        // 只要有一个字段有值就认为是有效数据
                        const hasData = Object.values(cert).some(v => v && v !== '');
                        if (!hasData) return null;
                        return cert;
                    } catch (e) {
                        console.log('新格式解析失败，尝试旧格式');
                    }
                }
                
                // 旧格式：& 分隔的字段
                const fields = decoded.split('&');
                
                const cert = {
                    id: fields[0] || '',
                    reportType: fields.length > 1 ? (fields[1] === 'J' ? '检定' : fields[1] === 'X' ? '校准' : '') : '',
                    result: fields.length > 2 ? (fields[2] === 'H' ? '合格' : fields[2] === 'B' ? '符合要求' : '') : '',
                    orderNumber: fields[3] || '',
                    client: fields[4] || '',
                    instrumentName: fields[5] || '',
                    manufacturer: fields[6] || '',
                    calibrationDate: fields[7] || '',
                    expiryDate: fields[8] || '',
                    factoryNumber: fields[9] || '',
                    model: fields[10] || ''
                };
                
                // 只要有一个字段有值就认为是有效数据
                const hasData = Object.values(cert).some(v => v && v !== '');
                if (!hasData) return null;
                return cert;
            } catch (e) {
                console.error('解析参数失败:', e);
                return null;
            }
        }
        
        // 检查证书是否有效
        function checkValidity(expiryDate) {
            if (!expiryDate) return null;
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const expiry = new Date(expiryDate);
            return expiry >= today;
        }
        
        // 渲染证书信息（一行一个，大字显示）
        function renderCert(cert) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('certInfo').classList.remove('hidden');

            // 顶部大编号（无编号时不显示整块）
            const topCertId = document.getElementById('certId');
            const topCertIdSection = topCertId.closest('.text-center');
            if (topCertIdSection) {
                topCertIdSection.style.display = (fieldConfig.certId && cert.id) ? 'block' : 'none';
            }
            topCertId.textContent = cert.id || '';

            // 动态构建单列卡片（全部黑色）
            const FIELD_DEFS = [
                { id: 'client',        label: '证书单位',     show: fieldConfig.client },
                { id: 'certIdInline',  label: '证书编号',     show: fieldConfig.certId },
                { id: 'reportType',    label: '报告类型',     show: fieldConfig.reportType },
                { id: 'instrumentName',label: '仪器名称',     show: fieldConfig.instrumentName },
                { id: 'manufacturer',  label: '制造厂',       show: fieldConfig.manufacturer },
                { id: 'model',         label: '规格型号',     show: fieldConfig.model },
                { id: 'factoryNumber', label: '出厂编号',     show: fieldConfig.factoryNumber },
                { id: 'orderNumber',   label: '委托单号',     show: fieldConfig.orderNumber },
                { id: 'calibrationDate', label: '',           show: fieldConfig.calibrationDate, labelFn: () => cert.reportType === '检定' ? '检定日期' : '校准日期' },
                { id: 'expiryDate',    label: '有效期至',     show: fieldConfig.expiryDate },
                { id: 'result',        label: '',             show: fieldConfig.result,
                  labelFn: () => cert.reportType === '检定' ? '检定结果' : '校准结果' }
            ];

            const container = document.getElementById('infoCards');
            let html = '';
            FIELD_DEFS.forEach(f => {
                if (!f.show) return;
                const raw = cert[f.id];
                if (!raw) return;
                const label = f.labelFn ? f.labelFn() : f.label;
                html += '<div class="p-4 rounded-xl"><div class="text-sm font-bold text-slate-800">' + label + '</div><div class="text-sm text-slate-800 font-normal">' + raw + '</div></div>';
            });
            container.innerHTML = html;
        }
        
        // 显示错误（带调试信息和重试）
        function showError(reason, isNetworkError) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error').classList.remove('hidden');
            var msgEl = document.getElementById('errorMsg');
            if (isNetworkError) {
                msgEl.textContent = '网络加载失败，请点击下方按钮重试';
            } else if (reason) {
                msgEl.textContent = reason;
                dbg('showError: ' + reason);
            }
        }

        // 记录是否有数据源成功返回过数据（区分网络错误和证书不存在）
        var _anySourceOk = false;

        // 数据源列表（GitHub Pages 优先，JSDelivr 有 CDN 缓存延迟作为备用）
        const GH_DATA_URLS = [
            'https://jlzs-888.github.io/JLZSCY/data/certs.json',
            'https://cdn.jsdelivr.net/gh/JLZS-888/JLZSCY@main/data/certs.json',
            'https://raw.githubusercontent.com/JLZS-888/JLZSCY/main/data/certs.json'
        ];

        // 带超时的 fetch（5秒超时，允许浏览器缓存加速后续请求）
        function fetchWithTimeout(url, timeout) {
            var controller = new AbortController();
            var timer = setTimeout(function() { controller.abort(); }, timeout);
            return fetch(url, { signal: controller.signal }).then(function(res) {
                clearTimeout(timer);
                return res;
            }).catch(function(err) {
                clearTimeout(timer);
                throw err;
            });
        }

        // 尝试单个数据源
        async function trySource(url, certId) {
            var res = await fetchWithTimeout(url, 5000);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            var data = await res.json();
            _anySourceOk = true;
            if (!data.certs || !data.certs.length) return null;
            var cert = null;
            for (var j = 0; j < data.certs.length; j++) {
                if (data.certs[j].id === certId) {
                    cert = data.certs[j];
                    break;
                }
            }
            return { cert: cert, data: data };
        }

        // 通过证书编号从远程拉取数据（竞速模式：第一个成功立即返回，不等其他源）
        async function fetchCertById(certId) {
            var resolved = false;
            var resolveFirst = null;

            // 创建一个 deferred promise
            var racePromise = new Promise(function(resolve) { resolveFirst = resolve; });

            // 逐个启动请求（第一个立即发，后续延迟200ms作为备用，避免同时请求浪费带宽）
            GH_DATA_URLS.forEach(function(url, i) {
                var delay = i === 0 ? 0 : 200;
                setTimeout(async function() {
                    if (resolved) return;
                    var fullUrl = url + '?t=' + Date.now();
                    dbg('尝试数据源 ' + (i+1) + ': ' + fullUrl);
                    try {
                        var result = await trySource(fullUrl, certId);
                        if (resolved) return;
                        if (result && result.cert) {
                            resolved = true;
                            dbg('数据源 ' + (i+1) + ' 命中');
                            resolveFirst(result);
                        } else {
                            // 数据源成功但没找到证书，标记以便区分网络错误
                            _anySourceOk = true;
                            dbg('数据源 ' + (i+1) + ' 返回数据但未匹配');
                            // 如果是最后一个源且没找到证书
                            if (i === GH_DATA_URLS.length - 1 && !resolved) {
                                resolved = true;
                                resolveFirst(null);
                            }
                        }
                    } catch (e) {
                        dbg('数据源 ' + (i+1) + ' 失败: ' + e.message);
                    }
                }, delay);
            });

            // 总超时保护：5.5秒后如果还没结果就返回 null
            var safetyTimer = setTimeout(function() {
                if (!resolved) {
                    resolved = true;
                    resolveFirst(null);
                }
            }, 5500);

            try {
                var result = await racePromise;
                clearTimeout(safetyTimer);
                if (!result) return null;

                var cert = result.cert;
                var data = result.data;

                // 应用字段配置
                if (data && data.fieldConfig) {
                    FIELD_ORDER.forEach(function(f) {
                        fieldConfig[f] = data.fieldConfig[f] !== false;
                    });
                }

                if (cert.unit === 'S' || cert.unit === '深圳计量院') {
                    document.getElementById('defaultHeader').classList.add('hidden');
                    document.getElementById('szjlyHeader').classList.remove('hidden');
                }
                return cert;
            } catch (e) {
                clearTimeout(safetyTimer);
                return null;
            }
        }
        
        // 初始化
        window.onload = async function() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            dbg('页面加载完成，URL参数: id=' + id);

            if (id) {
                // 6秒总超时兜底（防止所有源都挂但 promise 永远不 resolve）
                var timeoutId = setTimeout(function() {
                    if (!window.__certLoaded) {
                        window.__certLoaded = true;
                        showError('证书 "' + decodeURIComponent(id) + '" 加载超时', true);
                    }
                }, 6000);
                window.__certLoaded = false;

                // 通过证书编号从远程拉取数据（二维码极简）
                const cert = await fetchCertById(decodeURIComponent(id));
                clearTimeout(timeoutId);

                if (window.__certLoaded) return; // 超时已处理
                window.__certLoaded = true;

                if (cert) {
                    renderCert(cert);
                } else {
                    if (!_anySourceOk) {
                        showError('证书 "' + decodeURIComponent(id) + '" 加载失败', true);
                    } else {
                        showError('证书 "' + decodeURIComponent(id) + '" 未找到', false);
                    }
                }
            } else {
                // 兼容旧方案：?d= 编码参数（Base64 JSON 或 & 分隔）
                const cert = parseUrlParams();
                if (cert) {
                    renderCert(cert);
                } else {
                    showError('无有效参数', false);
                }
            }
        };
    </script>
</body>
</html>
