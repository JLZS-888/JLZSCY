<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计量证书查询</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen p-4">
    <div class="max-w-lg mx-auto">
        <!-- 头部 -->
        <div class="bg-[#1e88e5] text-white p-6 rounded-t-3xl shadow-xl text-center">
            <h1 class="text-2xl font-black tracking-widest">计量证书查询</h1>
        </div>
        
        <!-- 主内容 -->
        <div class="bg-white p-6 rounded-b-3xl shadow-xl" id="contentArea">
            <!-- 加载中 -->
            <div id="loading" class="text-center py-12">
                <div class="text-4xl mb-4">📄</div>
                <p class="text-slate-400">加载中...</p>
            </div>
            
            <!-- 错误提示 -->
            <div id="error" class="hidden text-center py-12">
                <div class="text-4xl mb-4">❌</div>
                <p class="text-red-500 font-bold">未找到证书信息</p>
                <p class="text-slate-400 text-sm mt-2">请检查二维码是否正确</p>
            </div>
            
            <!-- 证书内容 -->
            <div id="certInfo" class="hidden space-y-4">
                <!-- 证书编号 -->
                <div class="text-center pb-4 border-b border-slate-100">
                    <div class="text-xs text-slate-400">证书编号</div>
                    <div id="certId" class="text-2xl font-black text-blue-600 tracking-wider"></div>
                </div>
                
                <!-- 信息卡片 -->
                <div class="grid grid-cols-2 gap-3 text-sm">
                    <!-- 1. 委托单位（第一行，全宽） -->
                    <div class="bg-slate-50 p-3 rounded-xl col-span-2">
                        <div class="text-xs text-slate-400">委托单位</div>
                        <div id="client" class="font-bold text-slate-700"></div>
                    </div>
                    <!-- 2. 证书编号 -->
                    <div class="bg-slate-50 p-3 rounded-xl">
                        <div class="text-xs text-slate-400">证书编号</div>
                        <div id="certIdInline" class="font-bold text-slate-700"></div>
                    </div>
                    <!-- 3. 报告类型 -->
                    <div class="bg-slate-50 p-3 rounded-xl">
                        <div class="text-xs text-slate-400">报告类型</div>
                        <div id="reportType" class="font-bold text-slate-700"></div>
                    </div>
                    <!-- 4. 仪器名称 -->
                    <div class="bg-slate-50 p-3 rounded-xl col-span-2">
                        <div class="text-xs text-slate-400">仪器名称</div>
                        <div id="instrumentName" class="font-bold text-slate-700"></div>
                    </div>
                    <!-- 5. 制造厂 -->
                    <div class="bg-slate-50 p-3 rounded-xl">
                        <div class="text-xs text-slate-400">制造厂</div>
                        <div id="manufacturer" class="font-bold text-slate-700"></div>
                    </div>
                    <!-- 6. 规格型号 -->
                    <div class="bg-slate-50 p-3 rounded-xl">
                        <div class="text-xs text-slate-400">规格型号</div>
                        <div id="model" class="font-bold text-slate-700"></div>
                    </div>
                    <!-- 7. 出厂编号 -->
                    <div class="bg-slate-50 p-3 rounded-xl">
                        <div class="text-xs text-slate-400">出厂编号</div>
                        <div id="factoryNumber" class="font-bold text-slate-700"></div>
                    </div>
                    <!-- 8. 委托单号 -->
                    <div class="bg-slate-50 p-3 rounded-xl">
                        <div class="text-xs text-slate-400">委托单号</div>
                        <div id="orderNumber" class="font-bold text-slate-700"></div>
                    </div>
                    <!-- 9. 检定/校准日期 -->
                    <div class="bg-emerald-50 p-3 rounded-xl">
                        <div class="text-xs text-emerald-400" id="dateLabel">校准日期</div>
                        <div id="calibrationDate" class="font-bold text-emerald-600"></div>
                    </div>
                    <!-- 10. 有效期至 -->
                    <div class="bg-red-50 p-3 rounded-xl">
                        <div class="text-xs text-red-400">有效期至</div>
                        <div id="expiryDate" class="font-bold text-red-600"></div>
                    </div>
                    <!-- 11. 检定/校准结果（最后一行，全宽突出显示） -->
                    <div class="bg-blue-50 p-4 rounded-xl col-span-2 border-2 border-blue-100">
                        <div class="text-xs text-blue-400" id="resultLabel">检定/校准结果</div>
                        <div id="result" class="font-bold text-xl"></div>
                    </div>
                </div>
                
                <!-- 有效状态 -->
                <div id="validStatus" class="mt-4 p-4 rounded-xl text-center font-bold"></div>
                

            </div>
        </div>
        
        <!-- 底部信息 -->
        <div class="text-center mt-6 text-xs text-slate-400">
            <p>计量证书查询</p>
        </div>
    </div>

    <script>
        // 字段配置（可由URL参数控制）
        let fieldConfig = {
            certId: true, reportType: true, result: true,
            orderNumber: true, client: true, instrumentName: true,
            manufacturer: true, calibrationDate: true, expiryDate: true,
            factoryNumber: true, model: true
        };
        
        // 字段顺序（与 cfgMask 对应）
        const FIELD_ORDER = ['certId', 'reportType', 'result', 'orderNumber', 'client', 'instrumentName', 'manufacturer', 'calibrationDate', 'expiryDate', 'factoryNumber', 'model'];
        
        // 解析URL参数
        function parseUrlParams() {
            const params = new URLSearchParams(window.location.search);
            const d = params.get('d');
            const cfg = params.get('cfg');
            if (!d) return null;
            
            // 解析字段配置掩码（11位：certId, reportType, result, orderNumber, client, instrumentName, manufacturer, calibrationDate, expiryDate, factoryNumber, model）
            if (cfg && cfg.length === 11) {
                FIELD_ORDER.forEach((f, i) => {
                    fieldConfig[f] = cfg[i] === '1';
                });
            } else if (cfg && cfg.length === 10) {
                // 兼容旧格式（10位，不含 certId）
                fieldConfig.certId = true;
                fieldConfig.reportType = cfg[0] === '1';
                fieldConfig.result = cfg[1] === '1';
                fieldConfig.orderNumber = cfg[2] === '1';
                fieldConfig.client = cfg[3] === '1';
                fieldConfig.instrumentName = cfg[4] === '1';
                fieldConfig.manufacturer = cfg[5] === '1';
                fieldConfig.calibrationDate = cfg[6] === '1';
                fieldConfig.expiryDate = cfg[7] === '1';
                fieldConfig.factoryNumber = cfg[8] === '1';
                fieldConfig.model = cfg[9] === '1';
            }
            
            try {
                const decoded = decodeURIComponent(d);
                
                // 尝试新格式：Base64 编码的 JSON
                if (decoded.startsWith('ey') || decoded.match(/^[A-Za-z0-9+/=]+$/)) {
                    try {
                        const jsonStr = decodeURIComponent(escape(atob(decoded)));
                        const data = JSON.parse(jsonStr);
                        
                        // 新格式：a=委托单位(第一), b=证书编号, c=报告类型, d=委托单号, e=仪器名称, f=制造厂, g=校准日期, h=有效期, i=出厂编号, j=规格型号, z=结果(最后)
                        const cert = {
                            client: data.a || '',
                            id: data.b || '',
                            reportType: data.c === 'J' ? '检定' : data.c === 'X' ? '校准' : '',
                            orderNumber: data.d || '',
                            instrumentName: data.e || '',
                            manufacturer: data.f || '',
                            calibrationDate: data.g || '',
                            expiryDate: data.h || '',
                            factoryNumber: data.i || '',
                            model: data.j || '',
                            result: data.z === 'H' ? '合格' : data.z === 'B' ? '符合要求' : ''
                        };
                        
                        // 兼容旧格式
                        if (!cert.client && data.cl) cert.client = data.cl;
                        if (!cert.id && data.id) cert.id = data.id;
                        if (!cert.reportType && data.rt) cert.reportType = data.rt === 'J' ? '检定' : data.rt === 'X' ? '校准' : '';
                        if (!cert.orderNumber && data.on) cert.orderNumber = data.on;
                        if (!cert.instrumentName && data.in) cert.instrumentName = data.in;
                        if (!cert.manufacturer && data.mf) cert.manufacturer = data.mf;
                        if (!cert.calibrationDate && data.cd) cert.calibrationDate = data.cd;
                        if (!cert.expiryDate && data.ed) cert.expiryDate = data.ed;
                        if (!cert.factoryNumber && data.fn) cert.factoryNumber = data.fn;
                        if (!cert.model && data.md) cert.model = data.md;
                        if (!cert.result && data.rs) cert.result = data.rs === 'H' ? '合格' : data.rs === 'B' ? '符合要求' : '';
                        
                        // 只要有一个字段有值就认为是有效数据
                        const hasData = Object.values(cert).some(v => v && v !== '');
                        if (!hasData) return null;
                        return cert;
                    } catch (e) {
                        console.log('新格式解析失败，尝试旧格式');
                    }
                }
                
                // 旧格式：& 分隔的字段
                const fields = decoded.split('&');
                
                const cert = {
                    id: fields[0] || '',
                    reportType: fields.length > 1 ? (fields[1] === 'J' ? '检定' : fields[1] === 'X' ? '校准' : '') : '',
                    result: fields.length > 2 ? (fields[2] === 'H' ? '合格' : fields[2] === 'B' ? '符合要求' : '') : '',
                    orderNumber: fields[3] || '',
                    client: fields[4] || '',
                    instrumentName: fields[5] || '',
                    manufacturer: fields[6] || '',
                    calibrationDate: fields[7] || '',
                    expiryDate: fields[8] || '',
                    factoryNumber: fields[9] || '',
                    model: fields[10] || ''
                };
                
                // 只要有一个字段有值就认为是有效数据
                const hasData = Object.values(cert).some(v => v && v !== '');
                if (!hasData) return null;
                return cert;
            } catch (e) {
                console.error('解析参数失败:', e);
                return null;
            }
        }
        
        // 检查证书是否有效
        function checkValidity(expiryDate) {
            if (!expiryDate) return null;
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const expiry = new Date(expiryDate);
            return expiry >= today;
        }
        
        // 辅助函数：显示/隐藏字段
        function setFieldVisibility(id, visible, value) {
            const el = document.getElementById(id);
            if (!el) return;
            const container = el.closest('.bg-slate-50, .bg-emerald-50, .bg-red-50');
            if (container) {
                container.style.display = visible ? 'block' : 'none';
            }
            if (visible && value) {
                el.textContent = value;
            }
        }
        
        // 渲染证书信息
        function renderCert(cert) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('certInfo').classList.remove('hidden');
            
            // 证书编号（根据配置显示/隐藏）- 顶部大标题
            const certIdContainer = document.getElementById('certId').closest('.text-center');
            if (certIdContainer) {
                certIdContainer.style.display = fieldConfig.certId ? 'block' : 'none';
            }
            document.getElementById('certId').textContent = cert.id || '(无编号)';
            
            // 证书编号（信息卡片内）
            setFieldVisibility('certIdInline', fieldConfig.certId, cert.id || '(无编号)');
            
            // 根据配置显示/隐藏字段
            setFieldVisibility('reportType', fieldConfig.reportType, cert.reportType);
            setFieldVisibility('result', fieldConfig.result, cert.result);
            setFieldVisibility('orderNumber', fieldConfig.orderNumber, cert.orderNumber);
            setFieldVisibility('client', fieldConfig.client, cert.client);
            setFieldVisibility('instrumentName', fieldConfig.instrumentName, cert.instrumentName);
            setFieldVisibility('manufacturer', fieldConfig.manufacturer, cert.manufacturer);
            setFieldVisibility('model', fieldConfig.model, cert.model);
            setFieldVisibility('factoryNumber', fieldConfig.factoryNumber, cert.factoryNumber);
            setFieldVisibility('calibrationDate', fieldConfig.calibrationDate, cert.calibrationDate);
            setFieldVisibility('expiryDate', fieldConfig.expiryDate, cert.expiryDate);
            
            // 设置结果颜色和标签
            const resultEl = document.getElementById('result');
            const resultLabelEl = document.getElementById('resultLabel');
            const dateLabelEl = document.getElementById('dateLabel');
            if (resultEl && fieldConfig.result) {
                resultEl.classList.remove('text-blue-600', 'text-emerald-600');
                if (cert.result === '合格') {
                    resultEl.classList.add('text-blue-600');
                    if (resultLabelEl) resultLabelEl.textContent = '检定结果';
                    if (dateLabelEl) dateLabelEl.textContent = '检定日期';
                } else {
                    resultEl.classList.add('text-emerald-600');
                    if (resultLabelEl) resultLabelEl.textContent = '校准结果';
                    if (dateLabelEl) dateLabelEl.textContent = '校准日期';
                }
            }
            
            // 有效状态
            const validStatus = document.getElementById('validStatus');
            const isValid = checkValidity(cert.expiryDate);
            
            if (isValid === null) {
                validStatus.textContent = '有效期未知';
                validStatus.className = 'mt-4 p-4 rounded-xl text-center font-bold bg-slate-100 text-slate-600';
            } else if (isValid) {
                const daysLeft = Math.ceil((new Date(cert.expiryDate) - new Date()) / (1000 * 60 * 60 * 24));
                validStatus.textContent = `✓ 证书有效（剩余 ${daysLeft} 天）`;
                validStatus.className = 'mt-4 p-4 rounded-xl text-center font-bold bg-emerald-100 text-emerald-600';
            } else {
                validStatus.textContent = '⚠ 证书已过期';
                validStatus.className = 'mt-4 p-4 rounded-xl text-center font-bold bg-red-100 text-red-600';
            }
        }
        
        // 显示错误
        function showError() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error').classList.remove('hidden');
        }
        
        // 初始化
        window.onload = function() {
            const cert = parseUrlParams();
            if (cert) {
                renderCert(cert);
            } else {
                showError();
            }
        };
    </script>
</body>
</html>
