<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计量证书查询</title>
    <!-- 使用极速 CDN 确保样式加载 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandBlue: '#2b66e3',
                        textGrey: '#a0aec0',
                        bgLight: '#f7fafc'
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .card-main {
                border-radius: 3.5rem;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            }
            .header-blue {
                background: linear-gradient(180deg, #3b82f6 0%, #2563eb 100%);
                border-radius: 3.5rem 3.5rem 0 0;
            }
            .input-custom {
                background-color: #ffffff;
                border: 1px solid #edf2f7;
                box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.05);
            }
            .btn-gradient {
                background: linear-gradient(180deg, #3b82f6 0%, #2563eb 100%);
                box-shadow: 0 10px 20px -3px rgba(37, 99, 235, 0.3);
            }
            .certificate-item {
                border-bottom: 1px solid #f3f4f6;
            }
            .certificate-item:last-child {
                border-bottom: none;
            }
        }
    </style>
</head>
<body class="bg-[#f0f4f8] flex items-center justify-center min-h-screen p-4 font-sans">
    
    <div class="max-w-[420px] w-full bg-white card-main overflow-hidden relative">
        
        <!-- 头部蓝色区域 (完全对齐图片) -->
        <div class="header-blue pt-14 pb-10 px-6 text-center">
            <h1 class="text-3xl font-bold tracking-tight text-white mb-2">计量证书查询</h1>
            <p class="text-[10px] text-blue-100 font-bold tracking-[0.25em] uppercase">OFFICIAL VERIFICATION SYSTEM</p>
        </div>
        
        <!-- 主体查询区 -->
        <div id="searchView" class="p-10 pt-12 pb-16 text-center">
            <p class="text-slate-400 text-sm mb-12 tracking-wide font-medium">请输入证书编号进行防伪查询</p>
            
            <div class="mb-10">
                <input type="text" id="certNoInput" placeholder="请输入编号" 
                       class="w-full p-6 input-custom rounded-[2rem] uppercase outline-none focus:ring-4 focus:ring-blue-50 text-center text-2xl font-bold text-slate-700 placeholder:text-slate-200 transition-all">
            </div>
            
            <button onclick="handleQuery()" class="w-full btn-gradient text-white py-6 rounded-[2rem] font-bold text-xl active:scale-95 transition-all tracking-[0.1em]">
                开始核验
            </button>
        </div>

        <!-- 结果展示区 -->
        <div id="resBox" class="p-8 hidden">
            <div class="bg-blue-50/40 rounded-[2.5rem] p-8 border border-blue-50 space-y-5" id="resItems"></div>
            <button onclick="location.reload()" class="w-full mt-10 bg-slate-800 text-white py-5 rounded-[2rem] font-bold text-base shadow-lg">返回重新查询</button>
        </div>

        <!-- 错误提示区 -->
        <div id="errBox" class="p-10 hidden text-center">
            <div class="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </div>
            <h3 class="text-xl font-bold text-slate-800 mb-2">核验未通过</h3>
            <p class="text-slate-400 text-sm mb-10">证书编号未找到，请核对后再试</p>
            <button onclick="location.reload()" class="text-blue-600 font-bold border-b-2 border-blue-600 pb-1 text-lg">返回重新输入</button>
        </div>

        <!-- 页脚装饰与文字 -->
        <div class="pt-2 pb-14 text-center relative">
            <div class="absolute -top-3 left-1/2 -translate-x-1/2 w-7 h-7 bg-white border border-slate-100 rounded-full flex items-center justify-center shadow-sm">
                <div class="w-1.5 h-1.5 bg-slate-200 rounded-full"></div>
            </div>
            
            <!-- 隐藏的二维码容器 -->
            <div id="qrcodeContainer" class="hidden mt-4 mb-6 animate-fade-in">
                <div id="qrcode" class="inline-block p-3 bg-white rounded-2xl border border-slate-100 shadow-sm"></div>
                <p class="text-[10px] text-slate-300 mt-2">扫码保存此查询结果</p>
            </div>

            <p class="text-slate-300 text-[10px] font-bold tracking-[0.3em] uppercase mt-10">METROLOGY VERIFICATION SYSTEM</p>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        const FIELDS = {
            orderNumber: '委托单号', client: '委托单位', instrumentName: '仪器名称',
            manufacturer: '制造厂家', calibrationDate: '执行日期', expiryDate: '有效期至',
            factoryNumber: '出厂编号', model: '规格型号'
        };

        function handleQuery() {
            const val = document.getElementById('certNoInput').value.trim().toUpperCase();
            if(!val) return;
            
            const db = window.certData || {};
            const certs = db.certs || db;
            const config = db.config || {};
            const data = certs[val];

            if(data) {
                const reportType = data.reportType || '校准';
                const dateLabel = reportType === '检定' ? '检定日期' : '校准日期';

                let html = `
                    <div class="flex items-center border-b border-blue-100/50 pb-5 mb-5 text-lg font-bold">
                        <span class="w-24 shrink-0 text-slate-400 text-sm font-normal">证书编号</span>
                        <span class="text-slate-800 font-mono ml-4 tracking-tight">${val}</span>
                    </div>
                    <div class="flex items-center border-b border-blue-50/50 py-4 text-sm font-medium">
                        <span class="w-24 shrink-0 text-slate-400 font-normal">报告类型</span>
                        <span class="ml-4 text-slate-800 font-bold uppercase tracking-wider">${reportType}</span>
                    </div>
                `;
                
                for(let k in FIELDS) {
                    if(config[k] !== false) {
                        let label = FIELDS[k];
                        if (k === 'calibrationDate') label = dateLabel;
                        html += `
                            <div class="flex items-start border-b border-blue-50/50 py-4 text-sm font-medium">
                                <span class="w-24 shrink-0 text-slate-400 font-normal">${label}</span>
                                <span class="ml-4 text-slate-800 break-all">${data[k] || '-'}</span>
                            </div>
                        `;
                    }
                }
                
                document.getElementById('resItems').innerHTML = html;
                document.getElementById('searchView').classList.add('hidden');
                document.getElementById('resBox').classList.remove('hidden');
                document.getElementById('qrcodeContainer').classList.remove('hidden');
                
                QRCode.toCanvas(document.getElementById('qrcode'), window.location.href, { 
                    width: 110, 
                    margin: 0, 
                    color: { dark: '#2563eb', light: '#ffffff' } 
                });
            } else {
                document.getElementById('searchView').classList.add('hidden');
                document.getElementById('errBox').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
