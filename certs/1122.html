<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>计量证书查询 - 1122</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:SimSun,serif;background:#f1f5f9;min-height:100vh;padding:16px}
.card{background:white;border-radius:16px;max-width:600px;margin:0 auto;box-shadow:0 4px 20px rgba(0,0,0,.1);overflow:hidden}
.header{background:#2563eb;color:white;padding:24px;text-align:center}
.header h1{font-size:20px;font-weight:700}
.content{padding:24px}
.badge{border-radius:16px;padding:16px;margin-bottom:20px;text-align:center;border:2px solid #86efac;background:#dcfce7;color:#166534}
.badge .icon{font-size:40px}
.badge .text{font-size:18px;font-weight:700;margin-top:8px}
.row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f3f4f6}
.row:last-child{border-bottom:none}
.row .label{color:#6b7280;font-size:14px}
.row .value{color:#1f2937;font-size:14px;font-weight:600;text-align:right;max-width:60%}
.footer{text-align:center;padding:16px;color:#9ca3af;font-size:12px}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    
    <h1>计量证书查询</h1>
  </div>
  <div class="content">
    <div class="badge">
      <div class="icon">✓</div>
      <div class="text">合格</div>
    </div>
    <div class="row"><span class="label">证书编号</span><span class="value">1122</span></div>
    <div class="row"><span class="label">报告类型</span><span class="value">检定</span></div>
    <div class="row"><span class="label">委托单位</span><span class="value">测试委托单位</span></div>
    <div class="row"><span class="label">仪器名称</span><span class="value">测试仪器</span></div>
    <div class="row"><span class="label">型号</span><span class="value">型号A</span></div>
    <div class="row"><span class="label">厂家</span><span class="value">测试厂家</span></div>
    <div class="row"><span class="label">出厂编号</span><span class="value">SN2024001</span></div>
    <div class="row"><span class="label">校准日期</span><span class="value">2024-01-15</span></div>
    <div class="row"><span class="label">有效期至</span><span class="value">2025-01-14</span></div>
  </div>
  <div class="footer">JLZS 计量证书管理系统</div>
</div>
</body>
</html>
