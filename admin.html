    <script>

        // 登录配置（可修改）

        const LOGIN_USER = 'admin';

        const LOGIN_PASS = 'jlzs888';

        

        // 检查登录状态

        function checkLogin() {

            if (localStorage.getItem('jlzscy_logged_in') === 'true') {

                document.getElementById('loginModal').classList.add('hidden');

                document.getElementById('mainContent').classList.remove('hidden');

                return true;

            }

            return false;

        }

        

        function doLogin() {

            const user = document.getElementById('loginUser').value.trim();

            const pass = document.getElementById('loginPass').value;

            if (user === LOGIN_USER && pass === LOGIN_PASS) {

                localStorage.setItem('jlzscy_logged_in', 'true');

                document.getElementById('loginModal').classList.add('hidden');

                document.getElementById('mainContent').classList.remove('hidden');

                document.getElementById('loginError').classList.add('hidden');

                // 登录成功后自动从云端拉取合并数据
                pullAndMerge();
            } else {

                document.getElementById('loginError').classList.remove('hidden');

            }

        }

        

        // 回车登录

        document.addEventListener('DOMContentLoaded', function() {

            document.getElementById('loginPass')?.addEventListener('keypress', function(e) {

                if (e.key === 'Enter') doLogin();

            });

            document.getElementById('loginUser')?.addEventListener('keypress', function(e) {

                if (e.key === 'Enter') document.getElementById('loginPass').focus();

            });

        });

        

        // 本地存储键名

        const STORAGE_KEY = 'jlzscy_certs';

        const CONFIG_KEY = 'jlzscy_config';

        

        let certs = [];

        let fieldConfig = {

            certId: true, reportType: true, result: true,

            orderNumber: true, client: true, instrumentName: true,

            manufacturer: true, calibrationDate: true, expiryDate: true,

            factoryNumber: true, model: true

        };

        

        // 字段顺序（用于 cfgMask 编码）

        const FIELD_ORDER = ['certId', 'reportType', 'result', 'orderNumber', 'client', 'instrumentName', 'manufacturer', 'calibrationDate', 'expiryDate', 'factoryNumber', 'model'];

        

        // 查询页基础URL - 固定指向 GitHub Pages
        const QUERY_BASE_URL = 'https://jlzs-888.github.io/JLZSCY/index.html';
        const GH_OWNER = 'JLZS-888';
        const GH_REPO = 'JLZSCY';
        // GitHub Raw 地址（用于 index.html 查询端拉取数据）
        const DATA_RAW_URL = 'https://raw.githubusercontent.com/' + GH_OWNER + '/' + GH_REPO + '/main/data/certs.json';


        // 从localStorage加载数据

        function loadCerts() {

            const stored = localStorage.getItem(STORAGE_KEY);

            certs = stored ? JSON.parse(stored) : [];

            renderList();

            updateStats();

            updateSuggestions();

        }

        

        // 保存到localStorage

        function saveToStorage() {

            localStorage.setItem(STORAGE_KEY, JSON.stringify(certs));

        }

        

        // 加载配置

        function loadConfig() {

            const stored = localStorage.getItem(CONFIG_KEY);

            if (stored) {

                fieldConfig = JSON.parse(stored);

            }

            renderFieldConfig();

        }

        

        // 保存配置

        function saveConfig() {

            localStorage.setItem(CONFIG_KEY, JSON.stringify(fieldConfig));

            alert('配置已保存');

        }

        

        function renderFieldConfig() {

            const fields = ['certId', 'reportType', 'result', 'orderNumber', 'client', 'instrumentName', 'manufacturer', 'calibrationDate', 'expiryDate', 'factoryNumber', 'model'];

            const labels = { 

                certId: '证书编号', reportType: '报告类型', result: '检定/校准结果',

                orderNumber: '委托单号', client: '证书单位', instrumentName: '仪器名称', 

                manufacturer: '制造厂', calibrationDate: '校准日期', expiryDate: '有效期至', 

                factoryNumber: '出厂编号', model: '规格型号' 

            };

            let html = '';

            for (let f of fields) {

                const checked = fieldConfig[f] !== false;

                html += `

                    <label class="flex items-center gap-3 p-2 rounded-lg hover:bg-slate-50 cursor-pointer">

                        <input type="checkbox" id="cfg_${f}" ${checked ? 'checked' : ''} onchange="fieldConfig['${f}'] = this.checked" class="w-4 h-4 accent-blue-500">

                        <span class="text-sm text-slate-600">${labels[f]}</span>

                    </label>`;

            }

            document.getElementById('fieldConfig').innerHTML = html;

        }

        

        function updateStats() {

            document.getElementById('totalCount').textContent = certs.length;

        }

        

        function updateSuggestions() {

            const clients = [...new Set(certs.map(c => c.client).filter(Boolean))];

            const insts = [...new Set(certs.map(c => c.instrumentName).filter(Boolean))];

            const manus = [...new Set(certs.map(c => c.manufacturer).filter(Boolean))];

            

            ['clientList', 'instList', 'manuList'].forEach(id => document.getElementById(id).innerHTML = '');

            clients.forEach(v => { const opt = document.createElement('option'); opt.value = v; document.getElementById('clientList').appendChild(opt); });

            insts.forEach(v => { const opt = document.createElement('option'); opt.value = v; document.getElementById('instList').appendChild(opt); });

            manus.forEach(v => { const opt = document.createElement('option'); opt.value = v; document.getElementById('manuList').appendChild(opt); });

        }

        

        function generateOrderNo() {

            const date = document.getElementById('date').value;

            if (date) {

                const d = new Date(date);

                const y = d.getFullYear().toString().slice(-2);

                const m = (d.getMonth() + 1).toString().padStart(2, '0');

                document.getElementById('orderNo').value = `${y}${m}WD-`;

            }

        }

        

        function calculateExpiryDate() {

            const date = document.getElementById('date').value;

            const period = parseInt(document.getElementById('validityPeriod').value) || 12;

            if (date) {

                const d = new Date(date);

                d.setMonth(d.getMonth() + period);

                d.setDate(d.getDate() - 1);

                document.getElementById('exp').value = d.toISOString().split('T')[0];

            }

        }

        

        function updateDateLabel() {

            const type = document.getElementById('reportType').value;

            document.getElementById('dateLabel').textContent = type === '检定' ? '检定日期' : '校准日期';

        }

        

        function updateResult() {

            const type = document.getElementById('reportType').value;

            const resultInput = document.getElementById('result');

            if (type === '检定') {

                resultInput.value = '合格';

                resultInput.classList.remove('text-emerald-600');

                resultInput.classList.add('text-blue-600');

            } else {

                resultInput.value = '符合要求';

                resultInput.classList.remove('text-blue-600');

                resultInput.classList.add('text-emerald-600');

            }

        }

        

        async function saveCert() {

            const certNo = document.getElementById('certNo').value.trim().toUpperCase();

            const id = certNo || 'TEMP_' + Date.now();

            

            const certData = {

                id: id,

                unit: document.getElementById('unit').value,

                reportType: document.getElementById('reportType').value,

                result: document.getElementById('result').value,

                orderNumber: document.getElementById('orderNo').value,

                client: document.getElementById('client').value,

                instrumentName: document.getElementById('inst').value,

                manufacturer: document.getElementById('manu').value,

                calibrationDate: document.getElementById('date').value,

                expiryDate: document.getElementById('exp').value,

                factoryNumber: document.getElementById('fact').value,

                model: document.getElementById('model').value,

                createdAt: new Date().toISOString()

            };

            

            // 检查是否已存在，更新或添加

            const existingIndex = certs.findIndex(c => c.id === id);

            if (existingIndex >= 0) {

                certs[existingIndex] = certData;

            } else {

                certs.unshift(certData);

            }

            

            saveToStorage();

            renderList();

            updateStats();

            updateSuggestions();

            alert('保存成功！');
            
            await syncDataToGitHub();
            resetForm();

        }

        

        function resetForm() {

            document.getElementById('certNo').disabled = false;

            document.getElementById('certNo').value = '';
            const linkDiv = document.getElementById('certUrlDisplay');
            if (linkDiv) linkDiv.remove();

            document.getElementById('orderNo').value = '';

            document.getElementById('client').value = '';

            document.getElementById('inst').value = '';

            document.getElementById('manu').value = '';

            document.getElementById('date').value = '';

            document.getElementById('exp').value = '';

            document.getElementById('fact').value = '';

            document.getElementById('model').value = '';

            document.getElementById('reportType').value = '校准';

            document.getElementById('unit').value = '';

            document.getElementById('validityPeriod').value = '12';

            updateDateLabel();

            updateResult();

            document.getElementById('formTitle').innerText = '📝 录入证书详情';

        }

        

        function renderList() {

            let html = '';

            certs.forEach(cert => {

                const displayId = cert.id.startsWith('TEMP_') ? '(无编号)' : cert.id;

                html += `

                    <div class="flex items-center justify-between p-4 bg-slate-50 rounded-xl hover:bg-slate-100 transition">

                        <div class="flex-1">

        async function handleWordImport(input) {

            const file = input.files[0];

            if (!file) return;

            

            document.getElementById('wordStatus').classList.remove('hidden');

            document.getElementById('wordStatus').textContent = '正在解析文档内容...';



            try {

                const arrayBuffer = await file.arrayBuffer();

                const result = await mammoth.extractRawText({ arrayBuffer });

                const text = result.value;



                const patterns = {

                    certNo: /证书编号[：:]\s*([A-Z0-9\-]+)/i,

                    client: /(?:证书单位|委托单位|送检单位|客户)[：:]\s*(.+?)(?:\n|$)/,

                    instrumentName: /(?:仪器名称|设备名称|被检器具)[：:]\s*(.+?)(?:\n|$)/,

                    manufacturer: /(?:制造厂|生产厂家)[：:]\s*(.+?)(?:\n|$)/,

                    calibrationDate: /(?:校准日期|检定日期)[：:]\s*(\d{4}[-/]\d{1,2}[-/]\d{1,2})/,

                    factoryNumber: /(?:出厂编号|出厂号)[：:]\s*(.+?)(?:\n|$)/,

                    model: /(?:规格型号|型号)[：:]\s*(.+?)(?:\n|$)/

                };



                const data = {};

                for (let key in patterns) {

                    const match = text.match(patterns[key]);

                    if (match) data[key] = match[1].trim();

                }



                if (data.certNo) document.getElementById('certNo').value = data.certNo;

                if (data.client) document.getElementById('client').value = data.client;

                if (data.instrumentName) document.getElementById('inst').value = data.instrumentName;

                if (data.manufacturer) document.getElementById('manu').value = data.manufacturer;

                if (data.calibrationDate) {

                    const formatted = data.calibrationDate.replace(/\//g, '-');

                    document.getElementById('date').value = formatted;

                    generateOrderNo();

                    calculateExpiryDate();

                }

                if (data.factoryNumber) document.getElementById('fact').value = data.factoryNumber;

                if (data.model) document.getElementById('model').value = data.model;



                document.getElementById('wordStatus').textContent = '✓ 识别完成，请检查数据';

                setTimeout(() => document.getElementById('wordStatus').classList.add('hidden'), 3000);

            } catch (e) {

                document.getElementById('wordStatus').textContent = '✗ 解析失败';

                console.error(e);

            }

            input.value = '';

        }

        // 从 GitHub 拉取远程数据并合并到本地（不会覆盖本地已有证书）
        async function pullAndMerge() {
            var pat = localStorage.getItem('jlzscy_gh_pat') || '';
            var statusEl = document.getElementById('saveStatus');
            var detailEl = document.getElementById('syncDetail');
            if (!pat) return;
            if (detailEl) { detailEl.classList.remove('hidden'); detailEl.textContent = '正在从云端拉取数据...'; }
            try {
                var res = await fetch('https://api.github.com/repos/' + GH_OWNER + '/' + GH_REPO + '/contents/data/certs.json', {
                    headers: { 'Authorization': 'token ' + pat, 'Accept': 'application/vnd.github.v3+json' }
                });
                if (!res.ok) {
                    if (detailEl) { detailEl.textContent = '提示：云端暂无数据'; setTimeout(function() { detailEl.classList.add('hidden'); }, 3000); }
                    return;
                }
                var fileData = await res.json();
                var remoteCerts = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));
                if (!remoteCerts.certs || !remoteCerts.certs.length) {
                    if (detailEl) { detailEl.textContent = '提示：云端暂无证书数据'; setTimeout(function() { detailEl.classList.add('hidden'); }, 3000); }
                    return;
                }
                // 合并：以 id 为主键，远程有本地没有的加入本地，远程有的更新本地的
                var mergedCount = 0;
                var updatedCount = 0;
                var remoteIds = {};
                remoteCerts.certs.forEach(function(rc) { remoteIds[rc.id] = rc; });
                // 添加远程有但本地没有的证书
                remoteCerts.certs.forEach(function(rc) {
                    var found = certs.find(function(c) { return c.id === rc.id; });
                    if (!found) {
                        certs.push(rc);
                        mergedCount++;
                    }
                });
                // 合并远程字段配置
                if (remoteCerts.fieldConfig) {
                    FIELD_ORDER.forEach(function(f) {
                        if (fieldConfig[f] === undefined) {
                            fieldConfig[f] = remoteCerts.fieldConfig[f] !== false;
                        }
                    });
                    localStorage.setItem(CONFIG_KEY, JSON.stringify(fieldConfig));
                    renderFieldConfig();
                }
                if (mergedCount > 0) {
                    saveToStorage();
                    renderList();
                    updateStats();
                    updateSuggestions();
                }
                if (statusEl) { statusEl.textContent = '已合并(' + mergedCount + '条新)'; statusEl.className = 'text-[10px] bg-green-600 px-3 py-1 rounded-full font-bold'; }
                if (detailEl) { detailEl.textContent = '✅ 云端同步完成，合并了 ' + mergedCount + ' 条新证书'; setTimeout(function() { detailEl.classList.add('hidden'); }, 5000); }
            } catch(e) {
                console.error('Pull error:', e);
                if (detailEl) { detailEl.textContent = '❌ 拉取失败: ' + e.message; setTimeout(function() { detailEl.classList.add('hidden'); }, 5000); }
            }
        }

        // 将全部证书数据推送到 GitHub 仓库 data/certs.json（先拉取合并再推送，防止覆盖）
        async function syncDataToGitHub() {
            var statusEl = document.getElementById('saveStatus');
            var detailEl = document.getElementById('syncDetail');
            var pat = localStorage.getItem('jlzscy_gh_pat') || '';
            if (!pat) {
                if (statusEl) { statusEl.textContent = '请先填写Token'; statusEl.className = 'text-[10px] bg-red-600 px-3 py-1 rounded-full font-bold'; }
                if (detailEl) { detailEl.classList.remove('hidden'); detailEl.textContent = '错误：未配置 GitHub Token，请在下方填写后重试'; }
                return;
            }
            // 检查证书数量
            if (certs.length === 0) {
                if (statusEl) { statusEl.textContent = '无证书数据'; statusEl.className = 'text-[10px] bg-amber-600 px-3 py-1 rounded-full font-bold'; }
                if (detailEl) { detailEl.classList.remove('hidden'); detailEl.textContent = '提示：当前没有证书记录'; }
                return;
            }
            if (statusEl) { statusEl.textContent = '同步中(' + certs.length + '条)...'; statusEl.className = 'text-[10px] bg-amber-600 px-3 py-1 rounded-full font-bold'; }
            if (detailEl) { detailEl.classList.remove('hidden'); detailEl.textContent = '正在拉取云端数据进行合并...'; }
            try {
                var remoteSha = null;
                // 第一步：先拉取远程数据，合并到本地（防止覆盖其他设备的数据）
                try {
                    var checkRes = await fetch('https://api.github.com/repos/' + GH_OWNER + '/' + GH_REPO + '/contents/data/certs.json', {
                        headers: { 'Authorization': 'token ' + pat, 'Accept': 'application/vnd.github.v3+json' }
                    });
                    if (checkRes.ok) {
                        var existing = await checkRes.json();
                        remoteSha = existing.sha;
                        var remoteData = JSON.parse(decodeURIComponent(escape(atob(existing.content))));
                        if (remoteData.certs && remoteData.certs.length) {
                            // 合并：以 id 为主键，本地有就用本地（最新编辑的），本地没有就从远程拉入
                            var localIds = {};
                            certs.forEach(function(c) { localIds[c.id] = true; });
                            remoteData.certs.forEach(function(rc) {
                                if (!localIds[rc.id]) {
                                    certs.push(rc);
                                }
                            });
                            // 合并远程字段配置
                            if (remoteData.fieldConfig) {
                                FIELD_ORDER.forEach(function(f) {
                                    if (fieldConfig[f] === undefined) {
                                        fieldConfig[f] = remoteData.fieldConfig[f] !== false;
                                    }
                                });
                            }
                            saveToStorage();
                            renderList();
                            updateStats();
                            updateSuggestions();
                            if (detailEl) { detailEl.textContent = '合并完成，共 ' + certs.length + ' 条，正在推送...'; }
                        }
                    }
                } catch(mergeErr) {
                    console.warn('合并远程数据时出错（将直接推送本地数据）:', mergeErr);
                }

                // 第二步：构建推送数据
                var exportCerts = certs.map(function(c) {
                    return {
                        id: c.id,
                        reportType: c.reportType || '',
                        result: c.result || '',
                        orderNumber: c.orderNumber || '',
                        client: c.client || '',
                        instrumentName: c.instrumentName || '',
                        manufacturer: c.manufacturer || '',
                        calibrationDate: c.calibrationDate || '',
                        expiryDate: c.expiryDate || '',
                        factoryNumber: c.factoryNumber || '',
                        model: c.model || '',
                        unit: c.unit || ''
                    };
                });
                // 附带字段配置
                var payload = {
                    certs: exportCerts,
                    fieldConfig: JSON.parse(localStorage.getItem(CONFIG_KEY) || 'null') || fieldConfig,
                    updatedAt: new Date().toISOString()
                };
                var jsonStr = JSON.stringify(payload);
                var base64Content = btoa(unescape(encodeURIComponent(jsonStr)));
                var path = 'data/certs.json';

                // 使用第一步获取的 sha（如果有的话）
                var body = { message: 'Sync certs data (' + exportCerts.length + ' certs)', content: base64Content, branch: 'main' };
                if (remoteSha) {
                    body.sha = remoteSha;
                }
                var putRes = await fetch('https://api.github.com/repos/' + GH_OWNER + '/' + GH_REPO + '/contents/' + path, {
                    method: 'PUT',
                    headers: { 'Authorization': 'token ' + pat, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (putRes.ok) {
                    if (statusEl) { statusEl.textContent = '已同步(' + exportCerts.length + '条)'; statusEl.className = 'text-[10px] bg-green-600 px-3 py-1 rounded-full font-bold'; }
                    if (detailEl) { detailEl.textContent = '✅ 同步成功！扫码即可查询'; setTimeout(function() { detailEl.classList.add('hidden'); }, 5000); }
                    // 自动刷新 JSDelivr CDN 缓存
                    try {
                        await fetch('https://purge.jsdelivr.net/gh/' + GH_OWNER + '/' + GH_REPO + '@main/data/certs.json');
                        console.log('JSDelivr CDN cache purged');
                    } catch(purgeErr) {
                        console.warn('CDN purge failed:', purgeErr);
                    }
                } else {
                    var errData = await putRes.json().catch(function() { return {}; });
                    var errMsg = errData.message || ('HTTP ' + putRes.status);
                    if (statusEl) { statusEl.textContent = '同步失败'; statusEl.className = 'text-[10px] bg-red-600 px-3 py-1 rounded-full font-bold'; }
                    if (detailEl) { detailEl.textContent = '❌ 同步失败: ' + errMsg; }
                    console.error('Sync failed:', putRes.status, errData);
                }
            } catch(e) {
                console.error('Sync error:', e);
                if (statusEl) { statusEl.textContent = '同步出错'; statusEl.className = 'text-[10px] bg-red-600 px-3 py-1 rounded-full font-bold'; }
                if (detailEl) { detailEl.textContent = '❌ 网络错误: ' + e.message; }
            }
        }

            const el = document.getElementById('lastBackup');

            if (!el) return;

            if (lastBackup) {

                const date = new Date(lastBackup);

                el.textContent = date.toLocaleString('zh-CN');

                el.className = 'text-emerald-600 font-bold';

            } else {

                el.textContent = '未备份';

                el.className = 'text-slate-400';

            }

        }

        

        function importData(input) {

            const file = input.files[0];

            if (!file) return;

            const reader = new FileReader();

            reader.onload = function(e) {

                try {

                    const data = JSON.parse(e.target.result);

                    let added = 0, skipped = 0;

                    

                    if (data.certs && Array.isArray(data.certs)) {

                        // 合并导入：重复编号跳过，只追加新编号

                        data.certs.forEach(newCert => {

                            const exists = certs.some(c => c.id && c.id === newCert.id);

                            if (exists) {

                                // 重复编号，跳过不更新

                                skipped++;

                            } else {

                                // 新编号，追加

                                certs.push(newCert);

                                added++;

                            }

                        });

                        saveToStorage();

                        renderList();

                        updateStats();

                        updateSuggestions();

                    }

                    

                    if (data.config) {

                        fieldConfig = data.config;

                        localStorage.setItem(CONFIG_KEY, JSON.stringify(fieldConfig));

                        renderFieldConfig();

                    }

                    

                    alert(`导入完成！新增 ${added} 条，跳过重复 ${skipped} 条，现有共 ${certs.length} 条`);

                } catch (err) {

                    alert('导入失败：文件格式错误');

                }

            };

            reader.readAsText(file);

            input.value = '';

        }

        

        window.onload = async function() {

            // 先检查登录

            if (!checkLogin()) {

                // 未登录，显示登录框

                document.getElementById('loginModal').classList.remove('hidden');

                document.getElementById('loginModal').classList.add('flex');

            }

            

            loadConfig();

            loadCerts();

            updateLastBackupTime();

            document.getElementById('date').addEventListener('change', function() {

                generateOrderNo();

                calculateExpiryDate();

            });

            document.getElementById('validityPeriod').addEventListener('change', calculateExpiryDate);

        };
