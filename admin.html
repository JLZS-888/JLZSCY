<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计量证书管理后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen p-4">
    <div class="max-w-6xl mx-auto">
        <!-- 头部 -->
        <div class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white p-6 rounded-2xl shadow-xl mb-6">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-black">计量证书管理后台</h1>
                    <p class="text-blue-100 mt-1">JLZS-CXXY 证书管理系统</p>
                </div>
                <div class="text-right text-sm text-blue-100">
                    <div id="backupTime"></div>
                </div>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="grid grid-cols-4 gap-4 mb-6">
            <div class="bg-white p-4 rounded-xl shadow-md">
                <div class="text-2xl font-black text-blue-600" id="totalCount">0</div>
                <div class="text-sm text-slate-500">证书总数</div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-md">
                <div class="text-2xl font-black text-emerald-600" id="validCount">0</div>
                <div class="text-sm text-slate-500">有效期内</div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-md">
                <div class="text-2xl font-black text-amber-600" id="expiringCount">0</div>
                <div class="text-sm text-slate-500">即将过期(30天)</div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-md">
                <div class="text-2xl font-black text-red-600" id="expiredCount">0</div>
                <div class="text-sm text-slate-500">已过期</div>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-6">
            <!-- 左侧：添加/编辑证书 -->
            <div class="col-span-1">
                <div class="bg-white p-6 rounded-2xl shadow-xl sticky top-4">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                        <span class="text-2xl">📝</span>
                        <span id="formTitle">录入证书</span>
                    </h2>
                    
                    <form id="certForm" class="space-y-3">
                        <input type="hidden" id="editId">
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">报告类型</label>
                            <select id="reportType" class="w-full p-2 border border-slate-200 rounded-lg outline-none focus:border-blue-500" onchange="updateDateLabel(); updateResult();">
                                <option value="校准">校准</option>
                                <option value="检定">检定</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1" id="certNoLabel">证书编号</label>
                            <input type="text" id="certNo" class="w-full p-2 border border-slate-200 rounded-lg outline-none focus:border-blue-500" placeholder="选填，系统自动生成">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">委托单号</label>
                            <input type="text" id="orderNo" class="w-full p-2 border border-slate-200 rounded-lg outline-none focus:border-blue-500">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">委托单位</label>
                            <input type="text" id="client" class="w-full p-2 border border-slate-200 rounded-lg outline-none focus:border-blue-500" required>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">仪器名称</label>
                            <input type="text" id="inst" class="w-full p-2 border border-slate-200 rounded-lg outline-none focus:border-blue-500">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">制造厂</label>
                            <input type="text" id="manu" class="w-full p-2 border border-slate-200 rounded-lg outline-none focus:border-blue-500">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">规格型号</label>
                            <input type="text" id="model" class="w-full p-2 border border-slate-200 rounded-lg outline-none focus:border-blue-500">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">出厂编号</label>
                            <input type="text" id="factoryNo" class="w-full p-2 border border-slate-200 rounded-lg outline-none focus:border-blue-500">
                        </div>
                        
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-sm font-medium text-slate-600 mb-1" id="dateLabel">校准日期</label>
                                <input type="date" id="calDate" class="w-full p-2 border border-slate-200 rounded-lg outline-none focus:border-blue-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-600 mb-1">有效期至</label>
                                <input type="date" id="expDate" class="w-full p-2 border border-slate-200 rounded-lg outline-none focus:border-blue-500">
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1" id="resultLabel">校准结果</label>
                            <select id="result" class="w-full p-2 border border-slate-200 rounded-lg outline-none focus:border-blue-500">
                                <option value="符合要求">符合要求</option>
                                <option value="合格">合格</option>
                                <option value="不符合要求">不符合要求</option>
                                <option value="不合格">不合格</option>
                            </select>
                        </div>
                        
                        <div class="pt-4 space-y-2">
                            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700 transition">
                                保存证书
                            </button>
                            <button type="button" onclick="resetForm()" class="w-full bg-slate-200 text-slate-700 py-2 rounded-lg font-bold hover:bg-slate-300 transition">
                                重置
                            </button>
                        </div>
                    </form>
                    
                    <!-- 数据备份按钮 -->
                    <div class="mt-6 pt-6 border-t border-slate-200">
                        <h3 class="text-sm font-bold text-slate-600 mb-3">数据备份</h3>
                        <div class="space-y-2">
                            <button onclick="exportData()" class="w-full bg-emerald-500 text-white py-2 rounded-lg text-sm font-bold hover:bg-emerald-600 transition flex items-center justify-center gap-2">
                                <span>💾</span> 导出备份
                            </button>
                            <button onclick="document.getElementById('importFile').click()" class="w-full bg-amber-500 text-white py-2 rounded-lg text-sm font-bold hover:bg-amber-600 transition flex items-center justify-center gap-2">
                                <span>📂</span> 导入备份
                            </button>
                            <input type="file" id="importFile" accept=".json" class="hidden" onchange="importData(this)">
                            <p class="text-xs text-slate-400 text-center mt-2">建议保存到: J:\project_20260420_172121\projects</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧：证书列表 -->
            <div class="col-span-2">
                <div class="bg-white p-6 rounded-2xl shadow-xl">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold flex items-center gap-2">
                            <span class="text-2xl">📋</span>
                            证书列表
                        </h2>
                        <div class="flex gap-2">
                            <input type="text" id="searchInput" placeholder="搜索证书编号/委托单位..." 
                                class="px-4 py-2 border border-slate-200 rounded-lg outline-none focus:border-blue-500 w-64"
                                onkeyup="renderList()">
                        </div>
                    </div>
                    
                    <div id="certList" class="space-y-3">
                        <!-- 证书列表将在这里渲染 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 二维码弹窗 -->
    <div id="qrModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white p-6 rounded-2xl shadow-2xl max-w-sm w-full mx-4">
            <h3 class="text-lg font-bold mb-4 text-center">计量证书查询</h3>
            <div class="flex justify-center mb-4">
                <canvas id="qrCanvas"></canvas>
            </div>
            <div id="qrInfo" class="text-sm space-y-1 mb-4 bg-slate-50 p-3 rounded-lg"></div>
            <button onclick="closeQR()" class="w-full bg-slate-200 text-slate-700 py-2 rounded-lg font-bold hover:bg-slate-300 transition">
                关闭
            </button>
        </div>
    </div>

    <script>
        // 数据存储
        let certs = JSON.parse(localStorage.getItem('jlzs_certs') || '[]');
        let nextId = parseInt(localStorage.getItem('jlzs_nextId') || '1');
        
        // 查询页面基础URL（使用相对路径）
        const QUERY_BASE_URL = 'https://jlzs-888.github.io/JLZSCY/index.html';
        
        // 更新日期标签
        function updateDateLabel() {
            const isJianDing = document.getElementById('reportType').value === '检定';
            document.getElementById('dateLabel').textContent = isJianDing ? '检定日期' : '校准日期';
            document.getElementById('resultLabel').textContent = isJianDing ? '检定结果' : '校准结果';
        }
        
        // 更新结果选项
        function updateResult() {
            const isJianDing = document.getElementById('reportType').value === '检定';
            const resultSelect = document.getElementById('result');
            resultSelect.innerHTML = isJianDing 
                ? '<option value="合格">合格</option><option value="不合格">不合格</option>'
                : '<option value="符合要求">符合要求</option><option value="不符合要求">不符合要求</option>';
        }
        
        // 保存证书
        document.getElementById('certForm').onsubmit = function(e) {
            e.preventDefault();
            
            const editId = document.getElementById('editId').value;
            const certNo = document.getElementById('certNo').value.trim();
            
            const cert = {
                id: editId || (certNo || 'TEMP_' + Date.now()),
                reportType: document.getElementById('reportType').value,
                orderNumber: document.getElementById('orderNo').value.trim(),
                client: document.getElementById('client').value.trim(),
                instrumentName: document.getElementById('inst').value.trim(),
                manufacturer: document.getElementById('manu').value.trim(),
                model: document.getElementById('model').value.trim(),
                factoryNumber: document.getElementById('factoryNo').value.trim(),
                calibrationDate: document.getElementById('calDate').value,
                expiryDate: document.getElementById('expDate').value,
                result: document.getElementById('result').value,
                createdAt: editId ? (certs.find(c => c.id === editId)?.createdAt || new Date().toISOString()) : new Date().toISOString()
            };
            
            if (editId) {
                const idx = certs.findIndex(c => c.id === editId);
                if (idx >= 0) certs[idx] = cert;
            } else {
                certs.push(cert);
            }
            
            saveData();
            resetForm();
            renderList();
            updateStats();
        };
        
        // 保存到localStorage
        function saveData() {
            localStorage.setItem('jlzs_certs', JSON.stringify(certs));
            localStorage.setItem('jlzs_nextId', nextId.toString());
        }
        
        // 重置表单
        function resetForm() {
            document.getElementById('certForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('formTitle').textContent = '录入证书';
            updateDateLabel();
            updateResult();
        }
        
        // 删除证书
        function deleteCert(id) {
            if (!confirm('确定删除此证书？')) return;
            certs = certs.filter(c => c.id !== id);
            saveData();
            renderList();
            updateStats();
        }
        
        // 短编码：使用 | 分隔的数组格式，日期压缩为 YYYYMMDD
        function encodeCertShort(cert, id) {
            const fields = [];
            // 0: 委托单位
            fields.push(cert.client || '-');
            // 1: 证书编号
            fields.push(id.startsWith('TEMP_') ? '-' : id);
            // 2: 报告类型 (J=检定, X=校准)
            fields.push(cert.reportType === '检定' ? 'J' : 'X');
            // 3: 委托单号
            fields.push(cert.orderNumber || '-');
            // 4: 仪器名称
            fields.push(cert.instrumentName || '-');
            // 5: 制造厂
            fields.push(cert.manufacturer || '-');
            // 6: 日期 (YYYYMMDD)
            fields.push(cert.calibrationDate ? cert.calibrationDate.replace(/-/g, '') : '-');
            // 7: 有效期 (YYYYMMDD)
            fields.push(cert.expiryDate ? cert.expiryDate.replace(/-/g, '') : '-');
            // 8: 出厂编号
            fields.push(cert.factoryNumber || '-');
            // 9: 规格型号
            fields.push(cert.model || '-');
            // 10: 结果 (H=合格, B=符合)
            fields.push(cert.reportType === '检定' ? 'H' : 'B');
            return fields.join('|');
        }
        
        // 生成字段配置掩码（11位）
        function getFieldConfigMask(cert, id) {
            // 11位：certId, reportType, result, orderNumber, client, instrumentName, manufacturer, calibrationDate, expiryDate, factoryNumber, model
            let mask = '';
            mask += (id && !id.startsWith('TEMP_')) ? '1' : '0';  // certId
            mask += '1';  // reportType
            mask += '1';  // result
            mask += cert.orderNumber ? '1' : '0';
            mask += cert.client ? '1' : '0';
            mask += cert.instrumentName ? '1' : '0';
            mask += cert.manufacturer ? '1' : '0';
            mask += cert.calibrationDate ? '1' : '0';
            mask += cert.expiryDate ? '1' : '0';
            mask += cert.factoryNumber ? '1' : '0';
            mask += cert.model ? '1' : '0';
            return mask;
        }
        
        function showQR(id) {
            const cert = certs.find(c => c.id === id);
            if (!cert) return alert('证书不存在');
            
            const modal = document.getElementById('qrModal');
            const canvas = document.getElementById('qrCanvas');
            
            // 使用短编码格式
            const encoded = encodeCertShort(cert, id);
            const cfgMask = getFieldConfigMask(cert, id);
            const targetUrl = QUERY_BASE_URL + '?d=' + encodeURIComponent(encoded) + '&cfg=' + cfgMask;
            
            console.log('QR URL:', targetUrl);
            console.log('URL length:', targetUrl.length);
            
            // 使用更大的二维码尺寸和更低的容错级别，确保缩小后仍可识别
            QRCode.toCanvas(canvas, targetUrl, { 
                width: 280, 
                margin: 2, 
                color: { dark: '#000000', light: '#FFFFFF' },
                errorCorrectionLevel: 'L',  // L级容错，最小冗余
                scale: 3  // 较小的scale，让码点更稀疏
            }, function(error) {
                if (error) {
                    console.error('QR生成错误:', error);
                    alert('二维码生成失败，请检查数据');
                }
                
                // 显示证书信息在弹窗中
                const isJianDing = cert.reportType === '检定';
                const resultLabel = isJianDing ? '检定结果' : '校准结果';
                const resultText = isJianDing ? '合格' : '符合要求';
                // 只显示对应类型的信息，不显示"报告类型"字段，避免"检定/校准"同时出现
                const infoHtml = `
                    <div class="font-bold text-slate-700 border-b pb-2 mb-2">证书信息</div>
                    ${cert.client ? `<div><span class="text-slate-500">委托单位:</span> <span class="font-medium">${cert.client}</span></div>` : ''}
                    ${cert.id && !cert.id.startsWith('TEMP_') ? `<div><span class="text-slate-500">证书编号:</span> <span class="font-medium">${cert.id}</span></div>` : ''}
                    ${cert.instrumentName ? `<div><span class="text-slate-500">仪器名称:</span> <span class="font-medium">${cert.instrumentName}</span></div>` : ''}
                    <div class="pt-2 mt-2 border-t border-slate-200">
                        <span class="text-slate-500">${resultLabel}:</span> 
                        <span class="font-bold ${isJianDing ? 'text-blue-600' : 'text-emerald-600'}">${resultText}</span>
                    </div>
                `;
                document.getElementById('qrInfo').innerHTML = infoHtml;
                
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            });
        }
        
        function closeQR() {
            const modal = document.getElementById('qrModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }
        
        function editCert(id) {
            const cert = certs.find(c => c.id === id);
            if (!cert) return;

            document.getElementById('reportType').value = cert.reportType || '校准';
            updateDateLabel();
            updateResult();
            document.getElementById('certNo').value = cert.id.startsWith('TEMP_') ? '' : cert.id;
            document.getElementById('orderNo').value = cert.orderNumber || '';
            document.getElementById('client').value = cert.client || '';
            document.getElementById('inst').value = cert.instrumentName || '';
            document.getElementById('manu').value = cert.manufacturer || '';
            document.getElementById('model').value = cert.model || '';
            document.getElementById('factoryNo').value = cert.factoryNumber || '';
            document.getElementById('calDate').value = cert.calibrationDate || '';
            document.getElementById('expDate').value = cert.expiryDate || '';
            document.getElementById('result').value = cert.result || '符合要求';
            document.getElementById('editId').value = id;
            document.getElementById('formTitle').textContent = '编辑证书';
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        function renderList() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('certList');
            
            let filtered = certs;
            if (search) {
                filtered = certs.filter(c => 
                    (c.id && c.id.toLowerCase().includes(search)) ||
                    (c.client && c.client.toLowerCase().includes(search)) ||
                    (c.instrumentName && c.instrumentName.toLowerCase().includes(search))
                );
            }
            
            // 按有效期排序，即将过期的在前
            filtered = filtered.sort((a, b) => {
                const dateA = a.expiryDate ? new Date(a.expiryDate) : new Date('2099-01-01');
                const dateB = b.expiryDate ? new Date(b.expiryDate) : new Date('2099-01-01');
                return dateA - dateB;
            });
            
            if (filtered.length === 0) {
                list.innerHTML = '<div class="text-center py-12 text-slate-400">暂无证书数据</div>';
                return;
            }
            
            list.innerHTML = filtered.map(cert => {
                const isExpired = cert.expiryDate && new Date(cert.expiryDate) < new Date();
                const isExpiring = cert.expiryDate && !isExpired && 
                    (new Date(cert.expiryDate) - new Date()) < (30 * 24 * 60 * 60 * 1000);
                
                let statusBadge = '';
                if (isExpired) {
                    statusBadge = '<span class="px-2 py-1 bg-red-100 text-red-600 rounded text-xs font-bold">已过期</span>';
                } else if (isExpiring) {
                    statusBadge = '<span class="px-2 py-1 bg-amber-100 text-amber-600 rounded text-xs font-bold">即将过期</span>';
                } else {
                    statusBadge = '<span class="px-2 py-1 bg-emerald-100 text-emerald-600 rounded text-xs font-bold">有效</span>';
                }
                
                const isJianDing = cert.reportType === '检定';
                
                return `
                    <div class="bg-slate-50 p-4 rounded-xl hover:shadow-md transition border border-slate-100">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="font-bold text-lg ${isJianDing ? 'text-blue-600' : 'text-emerald-600'}">${cert.reportType}</span>
                                    ${statusBadge}
                                </div>
                                <div class="text-sm text-slate-500">${cert.id || '无编号'}</div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="showQR('${cert.id}')" class="px-3 py-1 bg-blue-100 text-blue-600 rounded-lg text-sm font-bold hover:bg-blue-200 transition">
                                    二维码
                                </button>
                                <button onclick="editCert('${cert.id}')" class="px-3 py-1 bg-slate-200 text-slate-700 rounded-lg text-sm font-bold hover:bg-slate-300 transition">
                                    编辑
                                </button>
                                <button onclick="deleteCert('${cert.id}')" class="px-3 py-1 bg-red-100 text-red-600 rounded-lg text-sm font-bold hover:bg-red-200 transition">
                                    删除
                                </button>
                            </div>
                        </div>
                        <div class="text-sm text-slate-600 grid grid-cols-2 gap-2">
                            <div><span class="text-slate-400">委托单位:</span> ${cert.client || '-'}</div>
                            <div><span class="text-slate-400">仪器名称:</span> ${cert.instrumentName || '-'}</div>
                            <div><span class="text-slate-400">有效期至:</span> ${cert.expiryDate || '-'}</div>
                            <div><span class="text-slate-400">结果:</span> ${cert.result || '-'}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function updateStats() {
            const now = new Date();
            const thirtyDaysLater = new Date(now.getTime() + 30 * 24 * 60 * 60 * 1000);
            
            const total = certs.length;
            const valid = certs.filter(c => c.expiryDate && new Date(c.expiryDate) > now).length;
            const expiring = certs.filter(c => {
                if (!c.expiryDate) return false;
                const exp = new Date(c.expiryDate);
                return exp > now && exp <= thirtyDaysLater;
            }).length;
            const expired = certs.filter(c => c.expiryDate && new Date(c.expiryDate) < now).length;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('validCount').textContent = valid;
            document.getElementById('expiringCount').textContent = expiring;
            document.getElementById('expiredCount').textContent = expired;
        }
        
        // 导出数据
        function exportData() {
            const dataStr = JSON.stringify(certs, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'jlzs-data.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            // 记录备份时间
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN');
            localStorage.setItem('jlzs_lastBackup', timeStr);
            document.getElementById('backupTime').textContent = '上次备份: ' + timeStr;
            
            alert('数据已导出为 jlzs-data.json\n建议保存到: J:\\project_20260420_172121\\projects');
        }
        
        // 导入数据（合并模式）
        function importData(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (!Array.isArray(imported)) {
                        throw new Error('数据格式错误');
                    }
                    
                    // 合并模式：相同ID更新，新ID追加
                    let updated = 0, added = 0;
                    imported.forEach(newCert => {
                        const idx = certs.findIndex(c => c.id === newCert.id);
                        if (idx >= 0) {
                            // 相同ID：保留原有数据，不更新
                            updated++;
                        } else {
                            // 新ID：追加
                            certs.push(newCert);
                            added++;
                        }
                    });
                    
                    saveData();
                    renderList();
                    updateStats();
                    alert(`导入完成！\n新增: ${added} 条\n重复跳过: ${updated} 条`);
                } catch (err) {
                    alert('导入失败: ' + err.message);
                }
                input.value = '';
            };
            reader.readAsText(file);
        }
        
        // 显示上次备份时间
        const lastBackup = localStorage.getItem('jlzs_lastBackup');
        if (lastBackup) {
            document.getElementById('backupTime').textContent = '上次备份: ' + lastBackup;
        }
        
        // 初始化
        renderList();
        updateStats();
        updateDateLabel();
        updateResult();
    </script>
</body>
</html>
